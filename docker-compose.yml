version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: emotion_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - emotion-network

volumes:
  mongodb_data:

networks:
  emotion-network:
    driver: bridge
